<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background Waves -->
    <div class="wave-container">
        <div class="wave wave-1"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
        <div class="wave wave-4"></div>
    </div>

    <!-- Particles -->
    <div class="gradient-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Register Container -->
    <div class="login-container">

        <div class="login-card">

            <div class="card-glow"></div>

            <!-- Header -->
            <div class="login-header">

                <div class="gradient-icon">
                    <div class="icon-wave"></div>

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14"/>
                        <path d="M5 12h14"/>
                    </svg>
                </div>

                <h2>Create Account</h2>

                <p>Join and start your journey today</p>
            </div>

            <!-- Register Form -->
            <form class="login-form" id="registerForm" novalidate>

                <!-- Full Name -->
                <div class="form-group">
                    <div class="input-container">
                        <div class="input-bg"></div>

                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            required
                            autocomplete="name"
                            placeholder=" "
                        >

                        <label for="fullname">Full Name</label>

                        <div class="input-wave"></div>
                    </div>

                    <span class="error-message" id="fullnameError"></span>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <div class="input-container">
                        <div class="input-bg"></div>

                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            placeholder=" "
                        >

                        <label for="username">Username</label>

                        <div class="input-wave"></div>
                    </div>

                    <span class="error-message" id="usernameError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <div class="input-container">
                        <div class="input-bg"></div>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            autocomplete="email"
                            placeholder=" "
                        >

                        <label for="email">Email Address</label>

                        <div class="input-wave"></div>
                    </div>

                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="input-container password-container">
                        <div class="input-bg"></div>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="new-password"
                            placeholder=" "
                        >

                        <label for="password">Password</label>

                        <button
                            type="button"
                            class="password-toggle"
                            id="passwordToggle"
                            aria-label="Toggle password visibility"
                        >
                            <div class="toggle-bg"></div>

                            <div class="toggle-icon">

                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>

                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>

                            </div>
                        </button>

                        <div class="input-wave"></div>
                    </div>

                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <div class="input-container password-container">
                        <div class="input-bg"></div>

                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            required
                            autocomplete="new-password"
                            placeholder=" "
                        >

                        <label for="confirmPassword">Confirm Password</label>

                        <div class="input-wave"></div>
                    </div>

                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Terms -->
                <div class="form-options">

                    <div class="checkbox-container">

                        <input type="checkbox" id="terms" required>

                        <label for="terms" class="checkbox-label">

                            <div class="gradient-checkbox">
                                <div class="checkbox-bg"></div>

                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>

                            I agree to the terms
                        </label>
                    </div>

                </div>

                <!-- Submit -->
                <button type="submit" class="gradient-button">

                    <div class="button-bg"></div>

                    <div class="button-content">

                        <span class="btn-text">
                            Create Account
                        </span>

                        <div class="btn-loader">
                            <div class="loader-wave"></div>
                            <div class="loader-wave"></div>
                            <div class="loader-wave"></div>
                        </div>

                    </div>

                    <div class="button-ripple"></div>

                </button>

            </form>

            <!-- Divider -->
            <div class="divider">

                <div class="divider-line">
                    <div class="line-gradient"></div>
                </div>

                <span>or sign up with</span>

                <div class="divider-line">
                    <div class="line-gradient"></div>
                </div>

            </div>

            <!-- Social -->
            <div class="social-login">

                <button type="button" class="social-btn" aria-label="Google">
                    <div class="social-bg google-bg"></div>

                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92"/>
                    </svg>
                </button>

                <button type="button" class="social-btn" aria-label="Facebook">
                    <div class="social-bg facebook-bg"></div>

                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12"/>
                    </svg>
                </button>

                <button type="button" class="social-btn" aria-label="Apple">
                    <div class="social-bg apple-bg"></div>

                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47"/>
                    </svg>
                </button>

            </div>

            <!-- Login Link -->
            <div class="signup-link">

                <p>
                    Already have an account?
                    <a href="index.html">Sign In</a>
                </p>

            </div>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>
</html>
